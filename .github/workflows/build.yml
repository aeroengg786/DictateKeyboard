name: Build APK
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: DevEmperor/DictateKeyboard
          ref: v5.0.0
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - run: bash tools/fetch-sherpa-onnx.sh
      - name: Generate a fresh signing key
        run: |
          keytool -genkeypair -v -keystore release.jks -alias dictate \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass dictatebuild123 -keypass dictatebuild123 \
            -dname "CN=Dictate, OU=Personal, O=Personal, L=City, S=State, C=PK"
          echo "storeFile=release.jks" > keystore.properties
          echo "storePassword=dictatebuild123" >> keystore.properties
          echo "keyAlias=dictate" >> keystore.properties
          echo "keyPassword=dictatebuild123" >> keystore.properties
      - name: Grant execute permission and Build (Skipping Lint)
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease -x lintVitalRelease
      - uses: actions/upload-artifact@v4
        with:
          name: dictate-apk
          path: app/build/outputs/apk/release/*.apk
